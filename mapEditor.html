<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";</script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="CSS/style.css">
    <title>Document</title>
</head>

<body>
    <main class="sticky-app">
        <section class="sticky-app__canvas" id="canvas" role="region" aria-label="Infinite canvas"><div id="world"></div></section>
        <div class="centerToolbar">
            <nav id="mediaToolbar" class="toolbar" role="toolbar">
                <button class="mediaControl" id="settingsBtn"><img class="icon" id="settingsIcon"
                        src="img/settingsIcon.png"></button>
                <span class="vBar"></span>
                <button class="mediaControl" id="bold"><img class="icon" id="settingsIcon"
                        src="img/mapEditor/boldIcon.png"></button>
                <button class="mediaControl" id="italic"><img class="icon" id="playPauseIcon"
                        src="img/mapEditor/italicIcon.png"></button>
                <button class="mediaControl" id="underline"><img class="icon" id="playPauseIcon"
                        src="img/mapEditor/underlineIcon.png"></button>
                <button class="mediaControl" id="stike"><img class="icon" id="playPauseIcon"
                        src="img/mapEditor/StrikeIcon.png"></button>
                
                <span class="vBar" id="imageDivider"></span>
                <button class="mediaControl" id="insertImage"><img class="icon" id="playPauseIcon"
                        src="img/mapEditor/imageIcon.png"></button>

                <div class="lastBtn">
                    <button class="sticky-btn sticky-btn--secondary" id="btnNode" aria-label="Add new sticky note">Add Node</button>
                    <button id="textBtn" class="sticky-btn sticky-btn--primary"><img id="cmapIcon" class="icon"
                            src="img/mapEditor/txtIcon.png"></button>
                </div>
            </nav>

            <nav id="deleteToolbar" class="toolbar hidden" role="toolbar">
                <div id="deleteDropzone">
                    <img class="icon" src="img/deleteIcon.png">
                </div>
            </nav>
        </div>

        <nav id="actionToolbars" class="toolbar hidden" role="toolbar">

            <div id="deleteDropzoneNode">
                <img class="icon" src="img/deleteIcon.png">
            </div>

            <div id="noteDropzone">
                <img class="icon" src="img/mapEditor/noteIcon.png">
            </div>

        </nav>

        <div class="borderPosition">
            <nav id="helpToolbar" class="toolbar" role="toolbar">
                <button id="helpBtn" class="sticky-btn sticky-btn--secondary"><img id="helpIcon" class="icon"
                        src="img/helpIcon.png"></button>
            </nav>
        </div>
    </main>

    <!-- SETTINGS OVERLAY -->
    <div id="settingsOverlay" class="settings-overlay hidden">
        <div id="panel" class="settings-panel">
            <div class="settings-header">
                <h3>Settings</h3>
                <button id="closeSettings" class="settings-close">✕</button>
            </div>

            <ul class="settings-list">
                <li class="has-submenu" id="fontMenu">
                    Change font
                    <div class="side-dropdown">
                        <ul>
                            <li data-font="Inter">Default</li>
                            <li data-font="Atkinson">Atkinson Hyperlegible</li>
                            <li data-font="Lexend">Lexend</li>
                            <li data-font="IbmMono">IBM Plex Mono</li>
                            <li data-font="Roboto">Roboto</li>
                        </ul>
                    </div>
                </li>
                <li id="save" class="settingsItem">
                    <span>Save</span>
                </li>
                <li id="import" class="settingsItem">
                    <span>Import</span>
                </li>
                <li id="export" class="settingsItem">
                    <span>Export</span>
                </li>
            </ul>
        </div>
    </div>
    <script src="JS/StickyEngine.js" defer></script>
    <script src="JS/Map.js" defer></script>
</body>

</html>
